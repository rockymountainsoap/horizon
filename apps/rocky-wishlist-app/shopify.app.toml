# WS0 native wishlist — Shopify app configuration.
# Extensions + Cloudflare Worker only — no local web process.

name = "rocky-wishlist-app"
client_id = "ebe31aebe73b979149df832d1e1f17bb"
application_url = "https://native-wishlist-worker.rocky-mountain-soap.workers.dev"
embedded = false

web_directories = []

[access_scopes]
scopes = "read_customers,write_customers,write_app_proxy,read_products,customer_read_customers,customer_write_customers"

[auth]
redirect_urls = [
  "https://native-wishlist-worker.rocky-mountain-soap.workers.dev/auth/callback"
]

[app_proxy]
url = "https://native-wishlist-worker.rocky-mountain-soap.workers.dev/wishlist"
prefix = "apps"
subpath = "wishlist"

[webhooks]
api_version = "2025-04"

# Uncomment when implementing uninstall cleanup:
# [[webhooks.subscriptions]]
# topics = [ "app/uninstalled" ]
# uri = "/webhooks/app-uninstalled"

[build]
automatically_update_urls_on_dev = false
dev_store_url = "rocky-horizon-development.myshopify.com"
